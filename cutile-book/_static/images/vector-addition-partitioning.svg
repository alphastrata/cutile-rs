  <rect width="900" height="480" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Main Title -->
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="500" fill="#ffffff" letter-spacing="-0.5">Partitioning: Dividing a Vector into Sub-Vectors</text>
  <line x1="250" y1="50" x2="650" y2="50" stroke="#76B900" stroke-width="2" opacity="0.6"/>

