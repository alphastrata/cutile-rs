  <!-- Bottom caption -->
  <text x="450" y="415" text-anchor="middle" font-size="14" fill="#ffffff">Each tile thread loads a data tile from its sub-vector, adds tiles, and stores the result back out to the same sub-vector.</text>
  <text x="450" y="445" text-anchor="middle" font-size="14" fill="#76B900" font-weight="600">All 4 tile threads run in parallel.</text>

</svg>
