    <text x="0" y="0" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">partition( <tspan fill="#76B900">[ 8 ]</tspan> )</text>
    <path d="M 0 18 L 0 55" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrow-white)"/>
