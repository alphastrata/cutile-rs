<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 555" font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style type="text/css">
      @font-face {
        font-family: 'NVIDIA';
        font-style: normal;
        font-weight: 400;
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Rg.woff2') format('woff2');
      }
      @font-face {
        font-family: 'RobotoMono';
        font-style: normal;
        font-weight: 400;
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/Roboto_Mono/static/RobotoMono-Regular.ttf') format('truetype');
      }
    </style>
    
    <!-- Arrow markers -->
    <marker id="arrow-white" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0.5 L 5 3 L 0 5.5" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="555" fill="#0d1117"/>
  <rect width="900" height="555" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Main Title -->
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="600" fill="#ffffff" letter-spacing="-0.5">SAXPY Memory Flow</text>
  <line x1="300" y1="50" x2="600" y2="50" stroke="#76B900" stroke-width="2" opacity="0.6"/>
  <text x="450" y="72" text-anchor="middle" font-size="14" fill="#8b949e">y = a × x + y — Load once, compute in registers, store once</text>

  <!-- ==================== TIER 1: Global Memory (HBM) ==================== -->
  <g transform="translate(50, 95)">
    <!-- Container -->
    <rect width="800" height="110" rx="10" fill="#161b22"/>
    <rect width="800" height="110" rx="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="2" y="2" width="796" height="32" rx="8" fill="#1c2128"/>
    <text x="400" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Global Memory (HBM) — Slow (~400 cycles)</text>
    
    <!-- Data boxes -->
    <g transform="translate(50, 45)">
      <!-- Scalar a -->
      <rect width="130" height="50" rx="8" fill="#ffa657"/>
      <text x="65" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">a (scalar)</text>
      <text x="65" y="40" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="14" font-weight="600" fill="#ffffff">2.0</text>
      
      <!-- Tensor X -->
      <g transform="translate(220, 0)">
        <rect width="180" height="50" rx="8" fill="#f97583"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">X (tensor)</text>
        <text x="90" y="40" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="12" font-weight="600" fill="#ffffff">[0, 1, 2, 3, ...]</text>
      </g>
      
      <!-- Tensor Y -->
      <g transform="translate(490, 0)">
        <rect width="180" height="50" rx="8" fill="#79c0ff"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Y (tensor)</text>
        <text x="90" y="40" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="12" font-weight="600" fill="#ffffff">[0, 1, 2, 3, ...]</text>
      </g>
    </g>
  </g>

  <!-- Arrows: Global → Registers -->
  <g transform="translate(0, 212)">
    <path d="M 165 0 L 165 45" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrow-white)"/>
    <text x="190" y="28" font-size="10" font-weight="500" fill="#c9d1d9">.broadcast()</text>
    
    <path d="M 410 0 L 410 45" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrow-white)"/>
    <text x="435" y="28" font-size="10" font-weight="500" fill="#c9d1d9">load_tile</text>
    
    <path d="M 680 0 L 680 45" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrow-white)"/>
    <text x="705" y="28" font-size="10" font-weight="500" fill="#c9d1d9">y.load()</text>
  </g>

  <!-- ==================== TIER 2: Registers (Tiles) ==================== -->
  <g transform="translate(50, 262)">
    <!-- Container -->
    <rect width="800" height="150" rx="10" fill="#161b22"/>
    <rect width="800" height="150" rx="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="2" y="2" width="796" height="32" rx="8" fill="#1c2128"/>
    <text x="400" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">⚡ Registers (Tiles) — Fast (~1 cycle)</text>
    
    <!-- Tile boxes -->
    <g transform="translate(30, 50)">
      <!-- tile_a -->
      <rect width="130" height="45" rx="6" fill="#ffa657"/>
      <text x="65" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">tile_a</text>
      <text x="65" y="36" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="10" font-weight="600" fill="#ffffff">[2, 2, 2, 2]</text>
      
      <!-- × symbol -->
      <text x="155" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">×</text>
      
      <!-- tile_x -->
      <g transform="translate(175, 0)">
        <rect width="130" height="45" rx="6" fill="#f97583"/>
        <text x="65" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">tile_x</text>
        <text x="65" y="36" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="10" font-weight="600" fill="#ffffff">[0, 1, 2, 3]</text>
      </g>
      
      <!-- + symbol -->
      <text x="330" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">+</text>
      
      <!-- tile_y -->
      <g transform="translate(350, 0)">
        <rect width="130" height="45" rx="6" fill="#79c0ff"/>
        <text x="65" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">tile_y</text>
        <text x="65" y="36" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="10" font-weight="600" fill="#ffffff">[0, 1, 2, 3]</text>
      </g>
      
      <!-- = symbol -->
      <text x="505" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">=</text>
      
      <!-- result -->
      <g transform="translate(525, 0)">
        <rect width="140" height="45" rx="6" fill="#56d364"/>
        <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">result</text>
        <text x="70" y="36" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="10" font-weight="600" fill="#ffffff">[0, 3, 6, 9]</text>
      </g>
    </g>
    
    <!-- Formula label -->
    <g transform="translate(30, 105)">
      <rect width="740" height="30" rx="6" fill="#21262d"/>
      <text x="370" y="20" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="12">
        <tspan fill="#ffffff">y = </tspan>
        <tspan fill="#ffa657">a</tspan>
        <tspan fill="#ffffff"> × </tspan>
        <tspan fill="#f97583">x</tspan>
        <tspan fill="#ffffff"> + </tspan>
        <tspan fill="#79c0ff">y</tspan>
        <tspan fill="#8b949e">  →  </tspan>
        <tspan fill="#ffffff">y = </tspan>
        <tspan fill="#ffa657">2</tspan>
        <tspan fill="#ffffff"> × </tspan>
        <tspan fill="#f97583">[0,1,2,3]</tspan>
        <tspan fill="#ffffff"> + </tspan>
        <tspan fill="#79c0ff">[0,1,2,3]</tspan>
        <tspan fill="#ffffff"> = </tspan>
        <tspan fill="#56d364">[0,3,6,9]</tspan>
      </text>
    </g>
  </g>

  <!-- Arrow: Registers → Global (aligned to Y updated box center) -->
  <g transform="translate(0, 418)">
    <path d="M 525 0 L 525 45" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrow-white)"/>
    <text x="555" y="28" font-size="10" font-weight="500" fill="#c9d1d9">y.store()</text>
  </g>

  <!-- ==================== TIER 3: Global Memory (Updated Y) ==================== -->
  <g transform="translate(380, 468)">
    <!-- Container -->
    <rect width="290" height="60" rx="10" fill="#161b22"/>
    <rect width="290" height="60" rx="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="2" y="2" width="286" height="26" rx="8" fill="#1c2128"/>
    <text x="145" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Y (updated)</text>
    
    <!-- Updated values -->
    <rect x="20" y="33" width="250" height="20" rx="4" fill="#56d364"/>
    <text x="145" y="48" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="12" font-weight="600" fill="#ffffff">[0, 3, 6, 9, ...]</text>
  </g>

  <!-- Speed comparison boxes -->
  <g transform="translate(50, 468)">
    <rect width="130" height="60" rx="8" fill="#161b22"/>
    <rect width="130" height="60" rx="8" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Global Memory</text>
    <text x="65" y="40" text-anchor="middle" font-size="16">🐢</text>
    <text x="65" y="54" text-anchor="middle" font-size="10" font-weight="500" fill="#c9d1d9">~400 cycles</text>
  </g>
  
  <g transform="translate(200, 468)">
    <rect width="130" height="60" rx="8" fill="#161b22"/>
    <rect width="130" height="60" rx="8" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Registers</text>
    <text x="65" y="40" text-anchor="middle" font-size="16">⚡</text>
    <text x="65" y="54" text-anchor="middle" font-size="10" font-weight="500" fill="#c9d1d9">~1 cycle</text>
  </g>

</svg>
