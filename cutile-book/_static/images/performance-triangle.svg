<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560">
  <!-- Background -->
  <rect width="720" height="560" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="360" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">The Performance Triangle</text>
  <text x="360" y="70" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="12">GPU performance depends on three key factors</text>
  
  <!-- Triangle - positioned lower with more padding -->
  <polygon points="360,140 130,410 590,410" fill="none" stroke="#30363d" stroke-width="2"/>
  
  <!-- Peak Performance Zone (center) - solid lighter orange -->
  <polygon points="360,220 265,355 455,355" fill="#ffb86c" stroke="#ffa657" stroke-width="2"/>
  <text x="360" y="295" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Peak</text>
  <text x="360" y="315" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Performance</text>
  <text x="360" y="345" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20">⚡</text>
  
  <!-- Memory Bandwidth (top vertex) -->
  <circle cx="360" cy="140" r="50" fill="#79c0ff"/>
  <text x="360" y="135" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Memory</text>
  <text x="360" y="150" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Bandwidth</text>
  
  <!-- Compute Utilization (bottom left) -->
  <circle cx="130" cy="410" r="50" fill="#56d364"/>
  <text x="130" y="405" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Compute</text>
  <text x="130" y="420" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Utilization</text>
  
  <!-- Occupancy (bottom right) -->
  <circle cx="590" cy="410" r="50" fill="#d2a8ff"/>
  <text x="590" y="410" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Occupancy</text>
  
  <!-- Side boxes with explanations -->
  
  <!-- Memory Bandwidth explanation (top right) -->
  <g transform="translate(510, 110)">
    <rect x="0" y="0" width="185" height="75" fill="#161b22" stroke="#79c0ff" stroke-width="1" rx="4"/>
    <text x="92" y="22" text-anchor="middle" fill="#79c0ff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Memory Bound?</text>
    <text x="92" y="40" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Fuse kernels</text>
    <text x="92" y="54" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Increase arithmetic intensity</text>
    <text x="92" y="68" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Use faster memory tiers</text>
  </g>
  
  <!-- Compute explanation (bottom left outside) -->
  <g transform="translate(25, 475)">
    <rect x="0" y="0" width="185" height="60" fill="#161b22" stroke="#56d364" stroke-width="1" rx="4"/>
    <text x="92" y="20" text-anchor="middle" fill="#56d364" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Compute Bound?</text>
    <text x="92" y="38" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Use Tensor Cores (f16/bf16)</text>
    <text x="92" y="52" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Already near optimal!</text>
  </g>
  
  <!-- Occupancy explanation (bottom right outside) -->
  <g transform="translate(510, 475)">
    <rect x="0" y="0" width="185" height="60" fill="#161b22" stroke="#d2a8ff" stroke-width="1" rx="4"/>
    <text x="92" y="20" text-anchor="middle" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Low Occupancy?</text>
    <text x="92" y="38" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Reduce tile size</text>
    <text x="92" y="52" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">→ Lower register pressure</text>
  </g>
  
  <!-- Edge labels -->
  <text x="225" y="265" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" transform="rotate(-55, 225, 265)">Coalesced access</text>
  <text x="495" y="265" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" transform="rotate(55, 495, 265)">Tile size tuning</text>
  <text x="360" y="440" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Balance parallelism</text>
</svg>
