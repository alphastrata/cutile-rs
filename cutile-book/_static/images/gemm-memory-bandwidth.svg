<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style type="text/css">
      @font-face {
        font-family: 'NVIDIA';
        font-style: normal;
        font-weight: 400;
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Rg.woff2') format('woff2');
      }
    </style>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="580" fill="#0d1117"/>
  <rect width="900" height="580" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="600" fill="#ffffff">The Memory Bandwidth Problem</text>
  <line x1="280" y1="55" x2="620" y2="55" stroke="#76B900" stroke-width="2" opacity="0.6"/>

  <!-- Left side: Per-Element Work -->
  <g transform="translate(50, 90)">
    <rect width="380" height="210" rx="10" fill="#161b22"/>
    <rect width="380" height="210" rx="10" fill="none" stroke="#6e7681" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="380" height="38" rx="10" fill="#f97583"/>
    <text x="190" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">For EACH output element C[i,j]</text>
    
    <!-- Content -->
    <g transform="translate(25, 58)">
      <rect x="-10" y="-12" width="70" height="26" rx="5" fill="#79c0ff"/>
      <text x="25" y="6" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Load:</text>
      <text x="75" y="6" font-size="13" fill="#c9d1d9">1 row from A</text>
      <rect x="220" y="-12" width="100" height="26" rx="5" fill="#ffa657"/>
      <text x="270" y="6" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">(K elements)</text>
      
      <text x="75" y="38" font-size="13" fill="#c9d1d9">1 col from B</text>
      <rect x="220" y="20" width="100" height="26" rx="5" fill="#ffa657"/>
      <text x="270" y="38" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">(K elements)</text>
      
      <rect x="-10" y="54" width="90" height="26" rx="5" fill="#56d364"/>
      <text x="35" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Compute:</text>
      <text x="95" y="72" font-size="13" fill="#c9d1d9">1 dot product</text>
      <rect x="245" y="54" width="80" height="26" rx="5" fill="#ffa657"/>
      <text x="285" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">(2K ops)</text>
      
      <rect x="-10" y="88" width="70" height="26" rx="5" fill="#d2a8ff"/>
      <text x="25" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Store:</text>
      <text x="75" y="106" font-size="13" fill="#c9d1d9">1 element</text>
    </g>
    
    <!-- Summary -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="340" height="28" rx="5" fill="#f97583"/>
      <text x="170" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Ratio: 1 compute op per memory load 🐢</text>
    </g>
  </g>

  <!-- Right side: GPU Capabilities -->
  <g transform="translate(470, 90)">
    <rect width="380" height="210" rx="10" fill="#161b22"/>
    <rect width="380" height="210" rx="10" fill="none" stroke="#6e7681" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="380" height="38" rx="10" fill="#79c0ff"/>
    <text x="190" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Modern GPU Capabilities</text>
    
    <!-- Content -->
    <g transform="translate(25, 70)">
      <text x="0" y="0" font-size="13" font-weight="600" fill="#c9d1d9">Memory Bandwidth:</text>
      <rect x="160" y="-16" width="100" height="26" rx="5" fill="#d2a8ff"/>
      <text x="210" y="2" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">~3 TB/s</text>
      
      <text x="0" y="50" font-size="13" font-weight="600" fill="#c9d1d9">Compute (FP32):</text>
      <rect x="140" y="34" width="130" height="26" rx="5" fill="#56d364"/>
      <text x="205" y="52" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">~300 TFLOPS</text>
    </g>
    
    <!-- Ratio visualization -->
    <g transform="translate(25, 145)">
      <text x="0" y="0" font-size="13" font-weight="600" fill="#ffffff">Compute : Memory ratio</text>
      <rect x="0" y="12" width="330" height="32" rx="5" fill="#21262d"/>
      <rect x="3" y="15" width="320" height="26" rx="4" fill="#56d364"/>
      <rect x="3" y="15" width="3.2" height="26" rx="2" fill="#d2a8ff"/>
      <text x="165" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">100× more compute than memory!</text>
    </g>
  </g>

  <!-- Bottom: The Problem -->
  <g transform="translate(50, 330)">
    <rect width="800" height="230" rx="10" fill="#161b22"/>
    <rect width="800" height="230" rx="10" fill="none" stroke="#6e7681" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="800" height="38" rx="10" fill="#8b949e"/>
    <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">⚠️ The Mismatch</text>
    
    <!-- Content -->
    <g transform="translate(40, 75)">
      <!-- Naive approach bar -->
      <text x="0" y="0" font-size="14" font-weight="600" fill="#c9d1d9">Naive GEMM needs:</text>
      <rect x="180" y="-16" width="90" height="26" rx="5" fill="#f97583"/>
      <text x="225" y="2" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1:1 ratio</text>
      
      <!-- GPU provides bar -->
      <text x="0" y="55" font-size="14" font-weight="600" fill="#c9d1d9">GPU provides:</text>
      <rect x="180" y="39" width="420" height="26" rx="5" fill="#56d364"/>
      <text x="390" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">100:1 ratio (compute >> memory)</text>
      
      <!-- Arrow showing waste -->
      <g transform="translate(620, 18)">
        <rect x="-15" y="-10" width="100" height="55" rx="6" fill="#f97583" fill-opacity="0.2"/>
        <rect x="-15" y="-10" width="100" height="55" rx="6" fill="none" stroke="#f97583" stroke-width="1.5"/>
        <path d="M 0 0 L 0 35" stroke="#f97583" stroke-width="2" stroke-dasharray="4,3"/>
        <text x="35" y="25" font-size="13" font-weight="700" fill="#f97583">Wasted!</text>
      </g>
    </g>
    
    <!-- Conclusion -->
    <g transform="translate(40, 175)">
      <rect x="0" y="0" width="720" height="38" rx="6" fill="#f97583"/>
      <text x="360" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">
        With naive GEMM, we're WASTING 99% of the GPU's compute power!
      </text>
    </g>
  </g>

</svg>
